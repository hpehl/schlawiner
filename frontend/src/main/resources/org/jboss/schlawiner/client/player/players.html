<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="chrome=1"/>
    <link rel="stylesheet" type="text/css" href="../../public/schlawiner.css"/>
    <title>Players</title>
</head>
<body>
<div class="page">
    <h1>Players</h1>
    <div class="d-flex flex-column">
        <table class="actions-table">
            <colgroup>
                <col style="width: 80%;">
                <col style="width: 15%;">
                <col style="width: 5%">
            </colgroup>
            <thead>
            <tr>
                <th class="text-left">Name</th>
                <th>Human</th>
                <th>&nbsp;</th>
            </tr>
            </thead>
            <tbody data-element="tbody"></tbody>
        </table>
        <div class="d-flex mb-5">
            <input type="text" placeholder="Add Player" data-element="addPlayer" class="flex-grow-1"/>
        </div>
        <div class="d-flex justify-content-end">
            <a href="#main" class="mr-5">Back</a>
            <a class="clickable" data-element="startGame">Start</a>
        </div>
    </div>
</div>
</body>
</html>
