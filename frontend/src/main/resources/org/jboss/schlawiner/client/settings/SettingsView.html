<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="chrome=1"/>
    <link rel="stylesheet" type="text/css" href="../../public/schlawiner.css"/>
    <title>Settings</title>
</head>
<body>
<div class="page">
    <h1>Settings</h1>
    <div class="form-group">
        <label for="name">Name</label>
        <input id="name" data-element="name" type="text" maxlength="20" class="form-control"/>
    </div>
    <div class="form-group">
        <label for="numbers">Numbers</label>
        <div class="form-control">
            <input id="numbers" data-element="numbers" type="range" min="1" max="20"/>
            <output for="numbers" data-element="numbersOutput">1</output>
        </div>
    </div>
    <div class="form-group">
        <label for="timeout" title="in seconds">Timeout</label>
        <div class="form-control">
            <input id="timeout" data-element="timeout" type="range" min="10" max="300" step="10"/>
            <output for="timeout" data-element="timeoutOutput">2</output>
        </div>
    </div>
    <div class="form-group">
        <label for="penalty">Penalty</label>
        <div class="form-control">
            <input id="penalty" data-element="penalty" type="range" min="1" max="10"/>
            <output for="penalty" data-element="penaltyOutput">3</output>
        </div>
    </div>
    <div class="form-group">
        <label for="retries">Retries</label>
        <div class="form-control">
            <input id="retries" data-element="retries" type="range" min="0" max="5"/>
            <output for="retries" data-element="retriesOutput">4</output>
        </div>
    </div>
    <div class="form-group">
        <label for="autoDice">Auto dice</label>
        <input id="autoDice" data-element="autoDice" type="checkbox"/>
    </div>
    <div class="form-group">
        <label for="level">Level</label>
        <select id="level" data-element="level">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>
    <p><a href="#main">Back</a></p>
</div>
</body>
</html>
